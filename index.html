<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown Editor</title>
</head>
<body>
  <p id="loading">Markdown Editor を読み込んでいます…</p>
  <script>
    (async () => {
      const paths = Array.from({ length: 15 }, (_, i) =>
        './markdown-editor-app/part-' + String(i + 1).padStart(3, '0') + '.html?v=20260713-3'
      );
      try {
        const responses = await Promise.all(paths.map(path => fetch(path)));
        if (responses.some(response => !response.ok)) throw new Error('アプリ本体の読み込みに失敗しました。');
        const html = (await Promise.all(responses.map(response => response.text()))).join('');
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.getElementById('loading').textContent = error.message;
        console.error(error);
      }
    })();
  </script>
</body>
</html>
